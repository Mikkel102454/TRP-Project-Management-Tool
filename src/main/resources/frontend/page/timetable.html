<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Time Registry</title>
    <link th:href="@{/style/style.css}" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen">

<header class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a th:href="@{/time}" class="block rounded">
            <h1 class="text-xl font-semibold text-gray-800">Time Registry</h1>
        </a>

        <div class="relative inline-block">

            <!-- User icon -->
            <div id="headerIcon"
                 class="w-10 h-10 bg-blue-200 font-bold rounded-full flex items-center justify-center cursor-pointer"
                 onclick="toggleUserMenu()">...
            </div>

            <!-- Dropdown -->
            <div id="userDropdown"
                 class="hidden absolute right-0 mt-2 w-48 bg-white border rounded-lg shadow-lg z-50">

                <!-- Logout -->
                <button class="w-full text-left px-4 py-2 hover:bg-gray-100"
                        th:onclick="|window.location.href='@{/logout}'|">
                    Logout
                </button>

                <!-- Admin only -->
                <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">

                    <button class="w-full text-left px-4 py-2 hover:bg-gray-100"
                            th:onclick="|window.location.href='@{/setup}'|">
                        Setup Account
                    </button>

                    <button class="w-full text-left px-4 py-2 hover:bg-gray-100"
                            th:onclick="|window.location.href='@{/time}'|">
                        Time Registry
                    </button>

                </div>

            </div>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-8">

    <div id="userList" class="flex flex-col gap-3"></div>

</main>


<script th:inline="javascript">
    let CONTEXT_PATH = /*[[@{/}]]*/ '/';
    CONTEXT_PATH = CONTEXT_PATH.replace(/\/$/, '');
</script>
<script th:src="@{/code/util/logger.js}"></script>
<script th:src="@{/code/util/components.js}"></script>
<script th:src="@{/code/util/avatar.js}"></script>
<script th:src="@{/code/util/user.js}"></script>
<script th:src="@{/code/consts.js}"></script>

<script th:src="@{/code/network/UserNet.js}"></script>
<script th:src="@{/code/network/ProjectNet.js}"></script>
<script th:src="@{/code/network/TimeNet.js}"></script>

<script th:src="@{/code/dto/User.js}"></script>
<script th:src="@{/code/dto/Project.js}"></script>
<script th:src="@{/code/dto/Task.js}"></script>
<script th:src="@{/code/dto/Time.js}"></script>
<script th:src="@{/code/util/header.js}"></script>

<script>

    let timeEntries = [];
    let projects = [];

    function renderEntries() {
        const container = document.getElementById("userList");
        container.innerHTML = "";

        console.log(timeEntries);
        console.log(projects);
        timeEntries.forEach(entry => {
            let foundTask = null;
            let foundProject = null;

            for (const project of projects) {
                const task = project.task?.find(t => t.id === entry.taskId);

                if (task) {
                    foundTask = task;
                    foundProject = project;
                    break;
                }
            }

            const div = document.createElement("div");
            div.className = "time-entry bg-white p-4 rounded-xl shadow flex justify-between items-center cursor-pointer hover:bg-gray-50";

            div.innerHTML = `
                <div class="flex items-center gap-4 w-full">

                    <!-- PROJECT + TASK -->
                    <div class="flex flex-col flex-1">
                        <p class="font-medium text-gray-800">${foundProject ? foundProject.title : "Unknown Project"}</p>
                        <p class="text-sm text-gray-500">${foundTask ? foundTask.title : "Unknown Task"}</p>
                    </div>

                    <!-- TIME INPUTS WRAPPER -->
                    <div class="flex gap-2">
                        <!-- START DATE -->
                        <input type="datetime-local"
                               value="${entry.startTime}"
                               class="w-48 px-2 py-1 border rounded focus:ring-2 focus:ring-blue-400 outline-none text-sm"
                               onchange="updateEntry(${entry.id}, this.value, null)">

                        <!-- STOP DATE -->
                        <input type="datetime-local"
                               value="${entry.endTime}"
                               class="w-48 px-2 py-1 border rounded focus:ring-2 focus:ring-blue-400 outline-none text-sm"
                               onchange="updateEntry(${entry.id}, null, this.value)">
                    </div>

                    <button
                        class="text-red-500 hover:text-red-700 text-sm font-medium px-2 py-1 rounded transition shrink-0"
                        onclick="if (confirm('Are you sure you want to delete this entry?')) { removeTimeEntry(${entry.id}); this.closest('.time-entry').remove(); }">
                        Delete
                    </button>

                </div>
            `;

            container.appendChild(div);
        });
    }

    async function updateEntry(id, startTime, endTime) {
        const entry = timeEntries.find(e => e.id === id);
        if(startTime != null) entry.startTime = startTime;
        if(endTime != null) entry.endTime = endTime;
        await updateTimeEntry(entry.id, entry.startTime, entry.endTime);
    }

    async function loadEntries() {
        const params = new URLSearchParams(window.location.search);

        if (!params.has('id')) {
            return
        }
        const userId = params.get('id');

        timeEntries = await getTimeEntries(userId);
        projects = await getAllProjects();

        renderEntries();
    }

    window.addEventListener('click', function(e) {
        const modal = document.getElementById('userModal');
        if (e.target === modal) {
            closeModal();
        }
    });

    loadEntries();

</script>

</body>
</html>
