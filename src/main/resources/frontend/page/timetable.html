<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Time Registry</title>
    <link th:href="@{/style/style.css}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>

<body class="bg-gradient-to-b from-gray-300 to-gray-200 min-h-screen font-mono text-sm">

<header class="bg-gradient-to-b from-gray-200 to-gray-400 border-b border-gray-500 shadow-inner">
    <div class="max-w-6xl mx-auto px-6 py-3 flex justify-between items-center">

        <a th:href="${#authorization.expression('hasRole(''ADMIN'')')} ? @{/time} : @{/}" class="text-gray-800 tracking-wider font-semibold">
            TIME ENTRIES
        </a>

        <div class="relative">
            <div id="headerIcon"
                 class="w-9 h-9 bg-gray-700 text-white flex items-center justify-center border border-black cursor-pointer"
                 onclick="toggleUserMenu()">...
            </div>

            <div id="userDropdown"
                 class="hidden absolute right-0 top-full mt-2 w-48
              bg-gray-200 border border-gray-600 shadow-lg z-50">

                <button class="w-full text-left px-3 py-2 hover:bg-gray-300"
                        th:onclick="|window.location.href='@{/logout}'|">
                    Logout
                </button>

                <button class="w-full text-left px-3 py-2 hover:bg-gray-300"
                        onclick="openPasswordModal(); toggleUserMenu()">
                    Change Password
                </button>

                <div th:if="${!#authorization.expression('hasRole(''ADMIN'')')}">
                    <button class="w-full text-left px-3 py-2 hover:bg-gray-300"
                            th:onclick="|window.location.href='@{/timetable(id=${#authentication.principal.id})}'|">
                        Time Registry
                    </button>
                </div>

                <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                    <button class="w-full text-left px-3 py-2 hover:bg-gray-300"
                            th:onclick="|window.location.href='@{/setup}'|">
                        Setup
                    </button>

                    <button class="w-full text-left px-3 py-2 hover:bg-gray-300"
                            th:onclick="|window.location.href='@{/time}'|">
                        Time Registry
                    </button>
                </div>

            </div>
        </div>

    </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-4">

    <div class="grid grid-cols-12 text-xs text-gray-700 mb-2 px-3">
        <div class="col-span-3">PROJECT</div>
        <div class="col-span-3">TASK</div>
        <div class="col-span-2">START</div>
        <div class="col-span-2">END</div>
        <div class="col-span-2"></div>
    </div>

    <div id="userList" class="flex flex-col gap-2"></div>

</main>


<script th:inline="javascript">
    let CONTEXT_PATH = /*[[@{/}]]*/ '/';
    CONTEXT_PATH = CONTEXT_PATH.replace(/\/$/, '');
</script>
<script th:src="@{/code/util/logger.js}"></script>
<script th:src="@{/code/util/components.js}"></script>
<script th:src="@{/code/util/avatar.js}"></script>
<script th:src="@{/code/util/user.js}"></script>
<script th:src="@{/code/consts.js}"></script>

<script th:src="@{/code/network/UserNet.js}"></script>
<script th:src="@{/code/network/ProjectNet.js}"></script>
<script th:src="@{/code/network/TimeNet.js}"></script>

<script th:src="@{/code/dto/User.js}"></script>
<script th:src="@{/code/dto/Project.js}"></script>
<script th:src="@{/code/dto/Task.js}"></script>
<script th:src="@{/code/dto/Time.js}"></script>
<script th:src="@{/code/util/header.js}"></script>

<script>
    const isAdmin = [[${#authorization.expression('hasRole(''ADMIN'')')}]];
</script>

<script>

    let timeEntries = [];
    let projects = [];

    function toDatetimeLocalValue(isoString) {
        const d = new Date(isoString);

        const pad = (n) => String(n).padStart(2, '0');

        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`
            + `T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function renderEntries() {
        const container = document.getElementById("userList");
        container.innerHTML = "";

        timeEntries.forEach(entry => {
            let foundTask = null;
            let foundProject = null;

            for (const project of projects) {
                const task = project.task?.find(t => t.id === entry.taskId);
                if (task) {
                    foundTask = task;
                    foundProject = project;
                    break;
                }
            }

            const div = document.createElement("div");
            div.className = `
grid grid-cols-12 items-center
h-16 px-3
gap-x-2
${entry?.attention ? "bg-gradient-to-r from-yellow-100 via-yellow-200 to-yellow-300"  : "bg-gradient-to-r from-gray-100 via-gray-200 to-gray-300"}
border border-gray-500
`;

            const deleteButton = isAdmin ? `
    <button class="px-2 py-1 border border-red-700
                   bg-red-500 text-white text-xs
                   hover:bg-red-600"
        onclick="if(confirm('Delete?')) { removeTimeEntry(${entry.id}); this.closest('.grid').remove(); }">
        DELETE
    </button>
` : '';

            div.innerHTML = `
<!-- PROJECT -->
<div class="col-span-3 text-gray-900 truncate">
    ${foundProject?.title || "UNKNOWN"}
</div>

<!-- TASK -->
<div class="col-span-3 text-gray-700 truncate">
    ${foundTask?.title || "UNKNOWN"}
</div>

<!-- START -->
<div class="col-span-2 flex justify-start">
    <input type="datetime-local"
            step="1"
           value="${toDatetimeLocalValue(entry.startTime)}"
           class="w-[95%] border border-gray-500 bg-gray-100 text-xs"
           onchange="updateEntry(${entry.id}, this.value, null, this)">
</div>

<!-- END -->
<div class="col-span-2 flex justify-start">
    <input type="datetime-local"
           step="1"
           value="${toDatetimeLocalValue(entry.endTime)}"
           class="w-[95%] border border-gray-500 bg-gray-100 text-xs"
           onchange="updateEntry(${entry.id}, null, this.value, this)">
</div>

<!-- DELETE -->
<div class="col-span-2 flex justify-end gap-2">
    <button class="px-2 py-1 border border-blue-700 hidden
                   bg-blue-500 text-white text-xs
                   hover:bg-blue-600 update-button"
        onclick="update(${entry.id}, this)">
        UPDATE
    </button>

    ${deleteButton}
</div>
`;

            container.appendChild(div);
        });
    }

    async function updateEntry(id, startTime, endTime, input) {
        const entry = timeEntries.find(e => e.id === id);
        if(startTime != null) entry.startTime = startTime;
        if(endTime != null) entry.endTime = endTime;
        const row = input.closest('.grid');

        const updateBtn = row.querySelector('.update-button');
        if (updateBtn) {
            updateBtn.classList.remove('hidden');
        }
    }

    async function update(id, input) {
        const entry = timeEntries.find(e => e.id === id);
        await updateTimeEntry(entry.id, new Date(entry.startTime).toISOString(), new Date(entry.endTime).toISOString());
        input.classList.add('hidden')
        const row = input.closest('.grid');

        if (row.classList.contains('from-yellow-100')) {
            row.classList.remove('from-yellow-100', 'via-yellow-200', 'to-yellow-300');
            row.classList.add('from-gray-100', 'via-gray-200', 'to-gray-300');
        }
    }

    async function loadEntries() {
        const params = new URLSearchParams(window.location.search);

        if (!params.has('id')) {
            return
        }
        const userId = params.get('id');

        timeEntries = await getTimeEntries(userId);
        projects = await getAllProjects();

        renderEntries();
    }

    loadEntries();

</script>

<script>
    window.addEventListener('click', function(e) {
        if (e.target.id === "userModal" || e.target.id === "passwordModal") {
            e.target.remove();
        }
    });

</script>

</body>
</html>
