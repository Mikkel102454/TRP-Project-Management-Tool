<div id="projectModal"
     class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">

  <div class="bg-white w-full max-w-lg rounded-xl shadow-lg p-6 relative">

    <!-- Close -->
    <button onclick="document.getElementById('projectModal').remove()"
            class="absolute top-3 right-3 text-gray-500 hover:text-black">
      ✕
    </button>

    <!-- Title -->
    <h2 class="text-xl font-semibold mb-4">Create Task</h2>

    <div class="space-y-4 text-sm text-gray-700">

      <!-- Task Name -->
      <div>
        <label class="block mb-1">Title</label>
        <input type="text"
               id="projectTitleInput"
               placeholder="Project name..."
               class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
      </div>

    </div>

    <!-- Actions -->
    <div class="mt-6 flex justify-between items-center">

      <button onclick="document.getElementById('projectModal').remove()"
              class="text-sm text-gray-500 hover:text-black">
        Cancel
      </button>

      <button class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition"
              onclick="createProject(document.getElementById('projectTitleInput').value); loadProjects(); document.getElementById('projectModal').remove();">
        Create Project
      </button>

    </div>

  </div>
</div>
