<div id="projectModal"
     class="fixed inset-0 bg-black/40 flex items-center justify-center font-mono text-sm">

  <!-- PANEL -->
  <div class="relative w-full max-w-md
              border border-gray-600
              bg-gradient-to-b from-gray-200 to-gray-300
              shadow-[0_10px_30px_rgba(0,0,0,0.5)]">

    <!-- HEADER BAR -->
    <div class="flex justify-between items-center
                px-4 py-2
                border-b border-gray-500
                bg-gradient-to-b from-gray-300 to-gray-400">

      <span class="tracking-wider text-gray-800">
        RENAME PROJECT
      </span>

      <button onclick="document.getElementById('projectModal').remove()"
              class="px-2 border border-gray-600
                     bg-gray-300 hover:bg-gray-400">
        ✕
      </button>
    </div>

    <!-- CONTENT -->
    <div class="p-4 space-y-4 text-gray-800">

      <!-- FIELD -->
      <div class="flex flex-col gap-1">
        <label class="text-xs tracking-wide text-gray-700">
          TITLE
        </label>

        <input type="text"
               id="projectTitleInput"
               placeholder="ENTER PROJECT NAME"
               value="{{title}}"
               class="px-2 py-1
                      border border-gray-500
                      bg-gray-100
                      focus:outline-none focus:bg-white">
      </div>

    </div>

    <!-- FOOTER -->
    <div class="flex justify-between items-center
                px-4 py-3
                border-t border-gray-500
                bg-gradient-to-t from-gray-300 to-gray-200">

      <button onclick="document.getElementById('projectModal').remove()"
              class="px-3 py-1 border border-gray-600
                     bg-gray-200 hover:bg-gray-300">
        CANCEL
      </button>

      <button
              class="px-3 py-1 border border-gray-700
                     bg-gradient-to-b from-gray-500 to-gray-700
                     text-white hover:from-gray-600 hover:to-gray-800"
              onclick="(async () => {
    const input = document.getElementById('projectTitleInput');
    const modal = document.getElementById('projectModal');

    if(await renameProject({{id}}, input.value)){
      document.getElementById('title').innerText = input.value;
      project.title = input.value;
    } else {
      alert('A project with this title already exist');
    }
    modal.remove();
  })()">
        RENAME
      </button>

    </div>

  </div>
</div>
