<div class="grid grid-cols-12 items-center
            h-16
            px-3
            bg-gradient-to-r from-gray-100 via-gray-200 to-gray-300
            border border-gray-500
            hover:bg-gray-300 transition cursor-pointer"
     onclick="window.location.href = 'task?id={{id}}';">

    <!-- PROJECT -->
    <div class="col-span-6">
        <div class="font-semibold text-gray-900 tracking-wide text-2xl">
            {{title}}
        </div>
    </div>

    <!-- SCHEDULE -->
    <div class="col-span-3 flex items-center gap-2 text-xs text-gray-700">
        {{scheduled}}
    </div>

    <!-- TASKS -->
    <div class="col-span-2 text-xs text-gray-700 flex flex-col gap-1">
        {{tasks}}
    </div>

    <!-- STATUS -->
    <div class="flex justify-end">
        <div class="relative w-6 h-6 {{isActive}} ">
            <!-- Outer glow -->
            <div class="absolute inset-0 bg-green-500 rounded-full blur-md opacity-60 -m-2"></div>

            <!-- LED body -->
            <div class="absolute inset-0 bg-green-500 rounded-full border-2 border-green-700"></div>

            <!-- Inner highlight (reflection) -->
            <div class="absolute top-1 left-1 w-3 h-3 bg-green-200 rounded-full opacity-70 blur-sm"></div>

            <!-- Center bright spot -->
            <div class="absolute inset-1 bg-green-300 rounded-full opacity-40"></div>
        </div>
    </div>

</div>
