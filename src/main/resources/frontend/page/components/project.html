<div class="grid grid-cols-12 items-center
            h-16
            px-3
            bg-gradient-to-r from-gray-100 via-gray-200 to-gray-300
            border border-gray-500
            hover:bg-gray-300 transition cursor-pointer"
     onclick="window.location.href = 'task?id={{id}}';">

    <!-- PROJECT -->
    <div class="col-span-6">
        <div class="font-semibold text-gray-900 tracking-wide text-2xl">
            {{title}}
        </div>
    </div>

    <!-- SCHEDULE -->
    <div class="col-span-3 flex items-center gap-2 text-xs text-gray-700">
        {{scheduled}}
    </div>

    <!-- TASKS -->
    <div class="col-span-2 text-xs text-gray-700 flex flex-col gap-1">
        {{tasks}}
    </div>

    <!-- STATUS -->
    {{led}}

</div>
