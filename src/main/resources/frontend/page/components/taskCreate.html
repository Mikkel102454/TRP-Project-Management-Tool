<div id="taskModal"
     class="fixed inset-0 bg-black/40 flex items-center justify-center font-mono text-sm">

    <!-- PANEL -->
    <div class="relative w-full max-w-md
                border border-gray-600
                bg-gradient-to-b from-gray-200 to-gray-300
                shadow-[0_10px_30px_rgba(0,0,0,0.5)]">

        <!-- HEADER -->
        <div class="flex justify-between items-center
                    px-4 py-2
                    border-b border-gray-500
                    bg-gradient-to-b from-gray-300 to-gray-400">

            <span class="tracking-wider text-gray-800">
                CREATE TASK
            </span>

            <button onclick="document.getElementById('taskModal').remove()"
                    class="px-2 border border-gray-600 bg-gray-300 hover:bg-gray-400">
                ✕
            </button>
        </div>

        <!-- CONTENT -->
        <div class="p-4 space-y-3 text-gray-800">

            <!-- TITLE -->
            <div class="grid grid-cols-3 items-center gap-3">
                <span class="text-xs text-gray-700 tracking-wide">TITLE</span>
                <input type="text"
                       id="taskTitleInput"
                       class="col-span-2 px-2 py-1 border border-gray-500 bg-gray-100 focus:bg-white outline-none">
            </div>

            <!-- ESTIMATE -->
            <div class="grid grid-cols-3 items-center gap-3">
                <span class="text-xs text-gray-700 tracking-wide">EST</span>
                <input type="text"
                       id="taskEstimateInput"
                       placeholder="4h"
                       class="col-span-2 px-2 py-1 border border-gray-500 bg-gray-100 focus:bg-white outline-none">
            </div>

            <!-- DEADLINE -->
            <div class="grid grid-cols-3 items-center gap-3">
                <span class="text-xs text-gray-700 tracking-wide">DEADLINE</span>
                <input type="datetime-local"
                       id="taskDeadlineInput"
                       class="col-span-2 px-2 py-1 border border-gray-500 bg-gray-100 focus:bg-white outline-none">
            </div>

            <!-- DESCRIPTION -->
            <div class="grid grid-cols-3 gap-3">
                <span class="text-xs text-gray-700 tracking-wide pt-1">DESC</span>
                <textarea rows="3"
                          id="taskDescriptionInput"
                          class="col-span-2 px-2 py-1 border border-gray-500 bg-gray-100 focus:bg-white outline-none resize-none"></textarea>
            </div>

        </div>

        <!-- FOOTER -->
        <div class="flex justify-between items-center
                    px-4 py-3
                    border-t border-gray-500
                    bg-gradient-to-t from-gray-300 to-gray-200">

            <button onclick="document.getElementById('taskModal').remove()"
                    class="px-3 py-1 border border-gray-600 bg-gray-200 hover:bg-gray-300">
                CANCEL
            </button>

            <button
                    class="px-3 py-1 border border-gray-700
                       bg-gradient-to-b from-gray-500 to-gray-700
                       text-white hover:from-gray-600 hover:to-gray-800"
                    onclick="startCreateTask(
                    document.getElementById('taskTitleInput').value,
                    document.getElementById('taskEstimateInput').value,
                    document.getElementById('taskDeadlineInput').value,
                    document.getElementById('taskDescriptionInput').value
                ); document.getElementById('taskModal').remove()">
                CREATE
            </button>

        </div>

    </div>
</div>
