<div id="taskModal"
     class="fixed inset-0 bg-black/40 flex items-center justify-center font-mono text-sm">

    <!-- PANEL -->
    <div class="relative w-full max-w-lg
                border border-gray-600
                bg-gradient-to-b from-gray-200 to-gray-300
                shadow-[0_10px_30px_rgba(0,0,0,0.5)]">

        <!-- HEADER -->
        <div class="flex justify-between items-center
                    px-4 py-2
                    border-b border-gray-500
                    bg-gradient-to-b from-gray-300 to-gray-400">

            <span class="tracking-wider text-gray-800 truncate block">
                {{title}}
            </span>

            <button onclick="document.getElementById('taskModal').remove()"
                    class="px-2 border border-gray-600 bg-gray-300 hover:bg-gray-400">
                ✕
            </button>
        </div>

        <!-- CONTENT -->
        <div class="p-4 space-y-3 text-gray-800">

            <!-- PRIORITY -->
            <div class="grid grid-cols-4 items-center gap-3">
                <span class="text-xs text-gray-700 tracking-wide">PRIORITY</span>
                <span class="col-span-3 px-2 py-1 border border-gray-500 bg-gray-100 text-xs">
                    {{priority}}
                </span>
            </div>

            <!-- TITLE -->
            <div class="grid grid-cols-4 items-center gap-3">
                <span class="text-xs text-gray-700">TITLE</span>
                <input type="text"
                       id="taskTitleInput"
                       value="{{title}}"
                       class="col-span-3 px-2 py-1 border border-gray-500 bg-gray-100 focus:bg-white outline-none">
            </div>

            <!-- USERS -->
            <div class="grid grid-cols-4 items-center gap-2 relative min-h-[32px]">
                <span class="text-xs text-gray-700">USERS</span>

                <div class="col-span-3 flex items-center gap-2">

                    <div class="selectedUsers flex items-center -space-x-2">
                        {{scheduled}}
                    </div>

                    <button class="userToggle px-2 border border-gray-600 bg-gray-200 hover:bg-gray-300">
                        +
                    </button>

                </div>

                <!-- Dropdown -->
                <div class="userDropdown hidden absolute right-0 top-full mt-1 w-56
                            bg-gray-200 border border-gray-600 shadow-lg p-2 z-50">

                    <input type="text"
                           placeholder="SEARCH"
                           class="userSearch w-full px-2 py-1 border border-gray-500 bg-gray-100 mb-2 outline-none">

                    <div class="userList max-h-40 overflow-y-auto text-xs"></div>
                </div>
            </div>

            <!-- ESTIMATE -->
            <div class="grid grid-cols-4 items-center gap-3">
                <span class="text-xs text-gray-700">EST</span>
                <input type="text"
                       id="taskEstimateInput"
                       value="{{estimatedTime}}"
                       class="col-span-3 px-2 py-1 border border-gray-500 bg-gray-100 focus:bg-white outline-none">
            </div>

            <!-- DEADLINE -->
            <div class="grid grid-cols-4 items-center gap-3">
                <span class="text-xs text-gray-700">DEADLINE</span>
                <input type="datetime-local"
                       id="taskDeadlineInput"
                       value="{{deadline}}"
                       class="col-span-3 px-2 py-1 border border-gray-500 bg-gray-100 focus:bg-white outline-none">
            </div>

            <!-- ACTIVE USERS -->
            <div class="grid grid-cols-4 items-center gap-3">
                <span class="text-xs text-gray-700">ACTIVE</span>
                <div class="col-span-3 flex gap-1">
                    {{actives}}
                </div>
            </div>

            <!-- DESCRIPTION -->
            <div class="grid grid-cols-4 gap-3">
                <span class="text-xs text-gray-700 pt-1">DESC</span>
                <textarea id="taskDescriptionInput"
                          class="col-span-3 px-2 py-1 border border-gray-500 bg-gray-100 focus:bg-white outline-none resize-none"
                >{{description}}</textarea>
            </div>

        </div>

        <!-- FOOTER -->
        <div class="flex justify-between items-center
                    px-4 py-3
                    border-t border-gray-500
                    bg-gradient-to-t from-gray-300 to-gray-200">

            <!-- DELETE -->
            <button
                    onclick="const confirmDelete = confirm('Delete task?'); if (!confirmDelete) return; deleteTask({{id}}); document.getElementById('taskModal').remove();"
                    class="px-3 py-1 border border-red-700
                       bg-gradient-to-b from-red-500 to-red-700
                       text-white hover:from-red-600 hover:to-red-800">
                DELETE
            </button>

            <!-- ACTIONS -->
            <div class="flex gap-2">

                <button
                        class="px-3 py-1 border border-gray-700
                           bg-gradient-to-b from-gray-500 to-gray-700
                           text-white hover:from-gray-600 hover:to-gray-800"
                        onclick="(async () => {
                        await {{isTimedAction}};
                        loadProject();
                        document.getElementById('taskModal').remove();
                    })()">
                    {{isTimed}}
                </button>

                <button
                        class="px-3 py-1 border border-gray-700
                           bg-gradient-to-b from-gray-500 to-gray-700
                           text-white hover:from-gray-600 hover:to-gray-800"
                        onclick="(async () => {
                        await startUpdateTask(
                            document.getElementById('taskTitleInput').value,
                            document.getElementById('taskEstimateInput').value,
                            document.getElementById('taskDeadlineInput').value,
                            document.getElementById('taskDescriptionInput').value
                        );
                        document.getElementById('taskModal').remove();
                    })()">
                    SAVE
                </button>

            </div>

        </div>

    </div>
</div>
