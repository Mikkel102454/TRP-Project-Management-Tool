<div id="taskModal"
     class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">

    <div class="bg-white w-full max-w-lg rounded-xl shadow-lg p-6 relative">

        <button onclick="document.getElementById('taskModal').remove()"
                class="absolute top-3 right-3 text-gray-500 hover:text-black">
            ✕
        </button>

        <h2 class="text-xl font-semibold mb-4">{{title}}</h2>

        <div class="space-y-4 text-sm text-gray-700">

            <div class="flex justify-between">
                <span>Priority</span>
                <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs">{{priority}}</span>
            </div>

            <!-- Task Name -->
            <div class="flex justify-between items-center gap-4">
                <span>Title</span>
                <input type="text"
                       id="taskTitleInput"
                       placeholder="Task name"
                       value="{{title}}"
                       class="px-2 py-1 border rounded focus:ring-2 focus:ring-blue-400 outline-none text-right">
            </div>

            <div class="flex items-center justify-between">

                <!-- LEFT -->
                <span>Scheduled Users</span>

                <!-- RIGHT -->
                <div class="flex items-center gap-2 h-8">

                    <!-- AVATARS -->
                    <div class="selectedUsers flex items-center -space-x-2 h-8 leading-none align-middle">
                        {{scheduled}}
                    </div>

                    <!-- BUTTON -->
                    <button class="userToggle w-8 h-8 border rounded-full flex items-center justify-center hover:bg-gray-100 shrink-0 leading-none">
                        +
                    </button>

                </div>

            </div>

            <!-- Dropdown -->
            <div class="userDropdown hidden absolute right-0 top-10 w-56 bg-white border rounded-lg shadow-lg p-2 z-50">

                <input type="text"
                       placeholder="Search users..."
                       class="userSearch w-full px-2 py-1 border rounded mb-2 outline-none">

                <div class="userList max-h-40 overflow-y-auto text-sm"></div>

            </div>

            <div class="flex justify-between items-center gap-4">
                <span>Estimated time</span>
                <input type="text"
                       id="taskEstimateInput"
                       placeholder="No Estimate"
                       value="{{estimatedTime}}"
                       class="px-2 py-1 border rounded focus:ring-2 focus:ring-blue-400 outline-none text-right">
            </div>

            <div class="flex justify-between items-center gap-4">
                <span>Deadline</span>
                <input type="datetime-local"
                       id="taskDeadlineInput"
                       value="{{deadline}}"
                       class="px-2 py-1 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
            </div>

            <div class="flex justify-between items-center">
                <span>Doing</span>
                <div class="flex items-center gap-2">
                    {{actives}}
                </div>
            </div>

            <div>
                <p class="mb-1">Description</p>
                <textarea id="taskDescriptionInput"
                          class="w-full bg-gray-100 p-3 rounded text-gray-600 outline-none"
                >{{description}}</textarea>
            </div>

        </div>

        <div class="mt-6 flex justify-between items-center">

            <!-- LEFT: DELETE -->
            <button
                    onclick="const confirmDelete = confirm('Are you sure you want to delete this task?'); if (!confirmDelete) return; deleteTask({{id}}); document.getElementById('taskModal').remove();"
                    class="text-red-500 hover:text-red-700 text-sm">
                Delete
            </button>

            <!-- RIGHT: ACTIONS -->
            <div class="flex gap-2">
                <button class="bg-black text-white px-4 py-2 rounded hover:bg-gray-800"
                        onclick="(async () => { await {{isTimedAction}}; loadProject(); document.getElementById('taskModal').remove(); })()">
                    {{isTimed}}
                </button>

                <button class="bg-black text-white px-4 py-2 rounded hover:bg-gray-800"
                        onclick="(async () => { await startUpdateTask(document.getElementById('taskTitleInput').value, document.getElementById('taskEstimateInput').value,
            document.getElementById('taskDeadlineInput').value, document.getElementById('taskDescriptionInput').value); document.getElementById('taskModal').remove(); })()">
                    Save
                </button>
            </div>

        </div>

    </div>
</div>
