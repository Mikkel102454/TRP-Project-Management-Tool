<div draggable="true"
     onclick="openModal({{id}})"
     data-id="{{id}}"
     class="task-item relative grid grid-cols-12 items-center
            h-14 px-3
            bg-gradient-to-r from-gray-100 via-gray-200 to-gray-300
            border border-gray-500
            hover:bg-gray-300
            cursor-grab transition">

    <!-- LEFT BANNER (does NOT affect layout) -->
    <div class="absolute left-0 top-0 h-full w-1.5 bg-blue-500 {{banner-color}}"></div>

    <!-- TASK (with progress) -->
    <div class="col-span-5 flex items-center gap-3 overflow-hidden">
        <div class="relative w-8 h-8 shrink-0">
            <svg class="w-8 h-8 rotate-[-90deg]">
                <circle cx="16" cy="16" r="12"
                        stroke="#9ca3af"
                        stroke-width="2"
                        fill="transparent" />
                <circle cx="16" cy="16" r="12"
                        stroke="currentColor"
                        stroke-width="2"
                        fill="transparent"
                        stroke-linecap="round"
                        stroke-dasharray="100"
                        stroke-dashoffset="{{progressOffset}}"
                        class="{{progressColor}}" />
            </svg>

            <div class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-gray-800">
                {{estimatedTime}}
            </div>
        </div>

        <div class="truncate text-gray-900 tracking-wide">
            {{title}}
        </div>
    </div>

    <!-- SCHEDULED -->
    <div class="col-span-3 flex items-center gap-1 overflow-hidden">
        {{scheduled}}
    </div>

    <!-- ACTIVES -->
    <div class="col-span-3 flex items-center gap-1 overflow-hidden">
        {{actives}}
    </div>

    <div class="flex justify-end items-center">
        <div class="text-gray-600 text-xs">☰</div>
    </div>
</div>
