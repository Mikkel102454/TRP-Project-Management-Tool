<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accounts</title>
    <link th:href="@{/style/style.css}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>

<body class="bg-gradient-to-b from-gray-300 to-gray-200 min-h-screen font-mono text-sm">

<!-- HEADER -->
<header class="bg-gradient-to-b from-gray-200 to-gray-400 border-b border-gray-500 shadow-inner">
    <div class="max-w-6xl mx-auto px-6 py-3 flex justify-between items-center">

        <a th:href="@{/}" class="text-gray-800 tracking-wider font-semibold">
            USER CONTROL
        </a>

        <div class="flex items-center gap-4">

            <button onclick="openCreateModal()"
                    class="px-3 py-1 border border-gray-600
                       bg-gradient-to-b from-gray-300 to-gray-500
                       hover:from-gray-400 hover:to-gray-600
                       text-gray-900 shadow">
                + NEW
            </button>

            <div class="relative">

                <div id="headerIcon"
                     class="w-9 h-9 bg-gray-700 text-white select-none
                     flex items-center justify-center
                     border border-black cursor-pointer"
                     onclick="toggleUserMenu()">...
                </div>

                <div id="userDropdown"
                     class="hidden absolute right-0 top-full mt-2 w-48
                     bg-gray-200 border border-gray-600 shadow-lg z-50">

                    <button class="w-full text-left px-3 py-2 hover:bg-gray-300"
                            th:onclick="|window.location.href='@{/logout}'|">
                        Logout
                    </button>

                    <button class="w-full text-left px-3 py-2 hover:bg-gray-300"
                            onclick="openPasswordModal(); toggleUserMenu()">
                        Change Password
                    </button>

                    <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                        <button class="w-full text-left px-3 py-2 hover:bg-gray-300"
                                th:onclick="|window.location.href='@{/setup}'|">
                            Setup
                        </button>

                        <button class="w-full text-left px-3 py-2 hover:bg-gray-300"
                                th:onclick="|window.location.href='@{/time}'|">
                            Time Registry
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </div>
</header>

<!-- CONTENT -->
<main class="max-w-6xl mx-auto px-6 py-4">

    <!-- COLUMN HEADERS -->
    <div class="grid grid-cols-12 text-gray-700 text-xs mb-2 px-2">
        <div class="col-span-6">USER</div>
        <div class="col-span-3">ROLE</div>
        <div class="col-span-2">ENABLED</div>
        <div class="col-span-1 text-right"></div>
    </div>

    <!-- USER LIST -->
    <div id="userList" class="flex flex-col gap-2"></div>

</main>

<!-- MODAL -->
<div id="userModal"
     class="fixed inset-0 bg-black/40 hidden items-center justify-center font-mono text-sm">

    <div class="relative w-full max-w-md
                border border-gray-600
                bg-gradient-to-b from-gray-200 to-gray-300
                shadow-[0_10px_30px_rgba(0,0,0,0.5)]">

        <!-- HEADER -->
        <div class="flex justify-between items-center
                    px-4 py-2
                    border-b border-gray-500
                    bg-gradient-to-b from-gray-300 to-gray-400">

            <span id="modalTitle" class="tracking-wider text-gray-800">
                CREATE USER
            </span>

            <button onclick="closeModal()"
                    class="px-2 border border-gray-600 bg-gray-300 hover:bg-gray-400">
                ✕
            </button>
        </div>

        <!-- CONTENT -->
        <div class="p-4 space-y-3 text-gray-800">

            <input type="hidden" id="userId">

            <div class="grid grid-cols-3 items-center gap-3">
                <span class="text-xs text-gray-700">USERNAME</span>
                <input id="usernameInput"
                       class="col-span-2 px-2 py-1 border border-gray-500 bg-gray-100 focus:bg-white outline-none">
            </div>

            <div class="grid grid-cols-3 items-center gap-3">
                <span class="text-xs text-gray-700">PASSWORD</span>
                <input id="passwordInput"
                       type="password"
                       class="col-span-2 px-2 py-1 border border-gray-500 bg-gray-100 focus:bg-white outline-none">
            </div>

            <div class="grid grid-cols-3 items-center gap-3">
                <span class="text-xs text-gray-700">ROLE</span>
                <select id="roleInput"
                        class="col-span-2 px-2 py-1 border border-gray-500 bg-gray-100 outline-none">
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>

            <div class="grid grid-cols-3 items-center gap-3">
                <span class="text-xs text-gray-700">ENABLED</span>
                <div class="col-span-2 flex justify-start">
                    <input id="enabledInput" type="checkbox">
                </div>
            </div>

        </div>

        <!-- FOOTER -->
        <div class="flex justify-between items-center
                    px-4 py-3
                    border-t border-gray-500
                    bg-gradient-to-t from-gray-300 to-gray-200">

            <button onclick="closeModal()"
                    class="px-3 py-1 border border-gray-600 bg-gray-200 hover:bg-gray-300">
                CANCEL
            </button>

            <button onclick="saveUser()"
                    class="px-3 py-1 border border-gray-700
                           bg-gradient-to-b from-gray-500 to-gray-700
                           text-white hover:from-gray-600 hover:to-gray-800">
                SAVE
            </button>

        </div>

    </div>
</div>

<script th:inline="javascript">
    let CONTEXT_PATH = /*[[@{/}]]*/ '/';
    CONTEXT_PATH = CONTEXT_PATH.replace(/\/$/, '');
</script>
<script th:src="@{/code/util/logger.js}"></script>
<script th:src="@{/code/util/components.js}"></script>
<script th:src="@{/code/util/avatar.js}"></script>
<script th:src="@{/code/util/user.js}"></script>
<script th:src="@{/code/consts.js}"></script>

<script th:src="@{/code/network/UserNet.js}"></script>

<script th:src="@{/code/dto/User.js}"></script>
<script th:src="@{/code/util/header.js}"></script>

<script>

    let users = [];

    function openCreateModal() {
        document.getElementById("modalTitle").innerText = "Create User";
        document.getElementById("userId").value = "";
        document.getElementById("usernameInput").value = "";
        document.getElementById("passwordInput").value = "";
        document.getElementById("passwordInput").placeholder = "At least 3 characters or more";
        document.getElementById("roleInput").value = "USER";
        //document.getElementById("deleteBtn").classList.add("hidden");
        document.getElementById("enabledInput").checked = true;
        openModal();
    }

    function openEditModal(user) {
        document.getElementById("modalTitle").innerText = "Edit User";
        document.getElementById("userId").value = user.id;
        document.getElementById("usernameInput").value = user.username;
        document.getElementById("passwordInput").value = "";
        document.getElementById("passwordInput").placeholder = "Leave empty to keep current";
        document.getElementById("roleInput").value = user.isAdmin ? "ADMIN" : "USER";
        //document.getElementById("deleteBtn").classList.remove("hidden");
        document.getElementById("enabledInput").checked = user.isEnabled;
        openModal();
    }

    function openModal() {
        const modal = document.getElementById('userModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function closeModal() {
        const modal = document.getElementById('userModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    async function saveUser() {
        const id = document.getElementById("userId").value;
        const username = document.getElementById("usernameInput").value;
        const password = document.getElementById("passwordInput").value;
        const role = document.getElementById("roleInput").value;
        const isEnabled = document.getElementById("enabledInput").checked;

        if (id) {
            console.log("update user", id);

            await updateUser(id, username, password, role === "ADMIN", isEnabled)

        } else {
            console.log("create user");

            await createUser(username, password, role === "ADMIN", isEnabled)
        }

        closeModal();
        loadUsers();
    }

    async function deleteUser() {
        const id = document.getElementById("userId").value;

        if (!id) return;

        const confirmDelete = confirm("Are you sure you want to delete this user?");
        if (!confirmDelete) return;

        console.log("delete user", id);

        /*
        await fetch(`/api/admin/user/${id}`, {
            method: "DELETE"
        });
        */

        closeModal();
        loadUsers();
    }

    function renderUsers() {
        const container = document.getElementById("userList");
        container.innerHTML = "";

        users.forEach(user => {
            const div = document.createElement("div");

            div.className = `
        grid grid-cols-12 items-center
        h-16 px-3
        bg-gradient-to-r from-gray-100 via-gray-200 to-gray-300
        border border-gray-500
        hover:bg-gray-300
        cursor-pointer
        `;

            div.innerHTML = `
        <div class="col-span-6 flex items-center gap-3 min-w-0">
            <div class="w-8 h-8 border border-gray-600 bg-gray-400 flex items-center justify-center text-xs font-bold">
                ${user.initial || user.username[0].toUpperCase()}
            </div>
            <div class="truncate text-gray-900 tracking-wide">
                ${user.username}
            </div>
        </div>

        <div class="col-span-3 text-xs text-gray-700">
            ${user.isAdmin ? "ADMIN" : "USER"}
        </div>

        <!-- STATUS -->
        <div class="col-span-2 flex items-center">
            <div class="relative w-6 h-6 ${user.isEnabled ? "" : "hidden"} ">
                <!-- Outer glow -->
                <div class="absolute inset-0 bg-green-500 rounded-full blur-md opacity-60 -m-2"></div>

                <!-- LED body -->
                <div class="absolute inset-0 bg-green-500 rounded-full border-2 border-green-700"></div>

                <!-- Inner highlight (reflection) -->
                <div class="absolute top-1 left-1 w-3 h-3 bg-green-200 rounded-full opacity-70 blur-sm"></div>

                <!-- Center bright spot -->
                <div class="absolute inset-1 bg-green-300 rounded-full opacity-40"></div>
            </div>
        </div>

        <div class="col-span-1 text-right text-gray-600 text-xs">
            EDIT
        </div>
        `;

            div.onclick = () => openEditModal(user);
            container.appendChild(div);
        });
    }

    async function loadUsers() {
        users = await getAllUsers();

        renderUsers();
    }

    loadUsers();

</script>

<script>
    window.addEventListener('click', function(e) {
        if (e.target.id === "userModal" || e.target.id === "passwordModal") {
            e.target.remove();
        }
    });

</script>

</body>
</html>
