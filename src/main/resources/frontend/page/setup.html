<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accounts</title>
    <link th:href="@{/style/style.css}" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen">

<header class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a th:href="@{/}" class="block rounded">
            <h1 class="text-xl font-semibold text-gray-800">Accounts</h1>
        </a>

        <div class="relative inline-block">

            <!-- User icon -->
            <div id="headerIcon"
                 class="w-10 h-10 bg-blue-200 font-bold rounded-full flex items-center justify-center cursor-pointer"
                 onclick="toggleUserMenu()">...
            </div>

            <!-- Dropdown -->
            <div id="userDropdown"
                 class="hidden absolute right-0 mt-2 w-48 bg-white border rounded-lg shadow-lg z-50">

                <!-- Logout -->
                <button class="w-full text-left px-4 py-2 hover:bg-gray-100"
                        th:onclick="|window.location.href='@{/logout}'|">
                    Logout
                </button>

                <!-- Admin only -->
                <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">

                    <button class="w-full text-left px-4 py-2 hover:bg-gray-100"
                            th:onclick="|window.location.href='@{/setup}'|">
                        Setup Account
                    </button>

                    <button class="w-full text-left px-4 py-2 hover:bg-gray-100"
                            th:onclick="|window.location.href='@{/time}'|">
                        Time Registry
                    </button>
                </div>

            </div>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-8">

    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">All Users</h2>

        <button onclick="openCreateModal()"
                class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition shadow-sm">
            + New User
        </button>
    </div>

    <div id="userList" class="flex flex-col gap-3"></div>

</main>

<!-- MODAL -->
<div id="userModal"
     class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center">

    <div class="bg-white w-full max-w-md rounded-xl shadow-lg p-6 relative">

        <button onclick="closeModal()"
                class="absolute top-3 right-3 text-gray-500 hover:text-black">
            ✕
        </button>

        <h2 id="modalTitle" class="text-xl font-semibold mb-4">Create User</h2>

        <div class="space-y-4 text-sm text-gray-700">

            <input type="hidden" id="userId">

            <div>
                <label class="block mb-1">Username</label>
                <input id="usernameInput"
                       type="text"
                       class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
            </div>

            <div>
                <label class="block mb-1">Password</label>
                <input id="passwordInput"
                       type="password"
                       placeholder="Leave empty to keep current"
                       class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
            </div>

            <div>
                <label class="block mb-1">Role</label>
                <select id="roleInput"
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                    <option value="USER">User</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>

            <div>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input id="enabledInput"
                           type="checkbox"
                           class="w-4 h-4">
                    <span>Enabled</span>
                </label>
            </div>
        </div>

        <!-- ACTIONS -->
        <div class="mt-6 flex justify-between items-center">

            <button onclick="closeModal()"
                    class="text-sm text-gray-500 hover:text-black">
                Cancel
            </button>

            <!-- RIGHT -->
            <div class="flex gap-4">
                <!--<button id="deleteBtn"
                        onclick="deleteUser()"
                        class="text-red-500 hover:text-red-700 text-sm hidden">
                    Delete user
                </button>-->

                <button onclick="saveUser()"
                        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition">
                    Save
                </button>
            </div>

        </div>

    </div>
</div>

<script th:inline="javascript">
    let CONTEXT_PATH = /*[[@{/}]]*/ '/';
    CONTEXT_PATH = CONTEXT_PATH.replace(/\/$/, '');
</script>
<script th:src="@{/code/util/logger.js}"></script>
<script th:src="@{/code/util/components.js}"></script>
<script th:src="@{/code/util/avatar.js}"></script>
<script th:src="@{/code/util/user.js}"></script>
<script th:src="@{/code/consts.js}"></script>

<script th:src="@{/code/network/UserNet.js}"></script>

<script th:src="@{/code/dto/User.js}"></script>
<script th:src="@{/code/util/header.js}"></script>

<script>

    let users = [];

    function openCreateModal() {
        document.getElementById("modalTitle").innerText = "Create User";
        document.getElementById("userId").value = "";
        document.getElementById("usernameInput").value = "";
        document.getElementById("passwordInput").value = "";
        document.getElementById("passwordInput").placeholder = "At least 3 characters or more";
        document.getElementById("roleInput").value = "USER";
        //document.getElementById("deleteBtn").classList.add("hidden");
        document.getElementById("enabledInput").checked = true;
        openModal();
    }

    function openEditModal(user) {
        document.getElementById("modalTitle").innerText = "Edit User";
        document.getElementById("userId").value = user.id;
        document.getElementById("usernameInput").value = user.username;
        document.getElementById("passwordInput").value = "";
        document.getElementById("passwordInput").placeholder = "Leave empty to keep current";
        document.getElementById("roleInput").value = user.isAdmin ? "ADMIN" : "USER";
        //document.getElementById("deleteBtn").classList.remove("hidden");
        document.getElementById("enabledInput").checked = user.isEnabled;
        openModal();
    }

    function openModal() {
        const modal = document.getElementById('userModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function closeModal() {
        const modal = document.getElementById('userModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    async function saveUser() {
        const id = document.getElementById("userId").value;
        const username = document.getElementById("usernameInput").value;
        const password = document.getElementById("passwordInput").value;
        const role = document.getElementById("roleInput").value;
        const isEnabled = document.getElementById("enabledInput").checked;

        if (id) {
            console.log("update user", id);

            await updateUser(id, username, password, role === "ADMIN", isEnabled)

        } else {
            console.log("create user");

            await createUser(username, password, role === "ADMIN", isEnabled)
        }

        closeModal();
        loadUsers();
    }

    async function deleteUser() {
        const id = document.getElementById("userId").value;

        if (!id) return;

        const confirmDelete = confirm("Are you sure you want to delete this user?");
        if (!confirmDelete) return;

        console.log("delete user", id);

        /*
        await fetch(`/api/admin/user/${id}`, {
            method: "DELETE"
        });
        */

        closeModal();
        loadUsers();
    }

    function renderUsers() {
        const container = document.getElementById("userList");
        container.innerHTML = "";

        users.forEach(user => {
            const div = document.createElement("div");
            div.className = "bg-white p-4 rounded-xl shadow flex justify-between items-center cursor-pointer hover:bg-gray-50";

            div.innerHTML = `
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-200 rounded-full flex items-center justify-center font-semibold">
                    ${user.initial || user.username[0].toUpperCase()}
                </div>
                <div>
                    <p class="font-medium text-gray-800">${user.username}</p>
                    <p class="text-sm text-gray-500">${user.isAdmin ? "Admin" : "User"}</p>
                </div>
            </div>
            <span class="text-gray-400 text-sm">Edit</span>
        `;

            div.onclick = () => openEditModal(user);

            container.appendChild(div);
        });
    }

    async function loadUsers() {
        users = await getAllUsers();

        renderUsers();
    }

    window.addEventListener('click', function(e) {
        const modal = document.getElementById('userModal');
        if (e.target === modal) {
            closeModal();
        }
    });

    loadUsers();

</script>

</body>
</html>
