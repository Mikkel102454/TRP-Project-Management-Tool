<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Time Registry</title>
    <link th:href="@{/style/style.css}" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen">

<header class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a th:href="@{/}" class="block rounded">
            <h1 class="text-xl font-semibold text-gray-800">Time Registry</h1>
        </a>

        <div class="relative inline-block">

            <!-- User icon -->
            <div id="headerIcon"
                 class="w-10 h-10 bg-blue-200 font-bold rounded-full flex items-center justify-center cursor-pointer"
                 onclick="toggleUserMenu()">...
            </div>

            <!-- Dropdown -->
            <div id="userDropdown"
                 class="hidden absolute right-0 mt-2 w-48 bg-white border rounded-lg shadow-lg z-50">

                <!-- Logout -->
                <button class="w-full text-left px-4 py-2 hover:bg-gray-100"
                        th:onclick="|window.location.href='@{/logout}'|">
                    Logout
                </button>

                <!-- Admin only -->
                <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">

                    <button class="w-full text-left px-4 py-2 hover:bg-gray-100"
                            th:onclick="|window.location.href='@{/setup}'|">
                        Setup Account
                    </button>

                    <button class="w-full text-left px-4 py-2 hover:bg-gray-100"
                            th:onclick="|window.location.href='@{/time}'|">
                        Time Registry
                    </button>
                </div>

            </div>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-8">

    <div id="userList" class="flex flex-col gap-3"></div>

</main>


<script th:inline="javascript">
    let CONTEXT_PATH = /*[[@{/}]]*/ '/';
    CONTEXT_PATH = CONTEXT_PATH.replace(/\/$/, '');
</script>
<script th:src="@{/code/util/logger.js}"></script>
<script th:src="@{/code/util/components.js}"></script>
<script th:src="@{/code/util/avatar.js}"></script>
<script th:src="@{/code/util/user.js}"></script>
<script th:src="@{/code/consts.js}"></script>

<script th:src="@{/code/network/UserNet.js}"></script>

<script th:src="@{/code/dto/User.js}"></script>
<script th:src="@{/code/util/header.js}"></script>

<script>

    let users = [];

    function renderUsers() {
        const container = document.getElementById("userList");
        container.innerHTML = "";

        users.forEach(user => {
            const div = document.createElement("div");
            div.className = "bg-white p-4 rounded-xl shadow flex justify-between items-center cursor-pointer hover:bg-gray-50";

            div.innerHTML = `
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-200 rounded-full flex items-center justify-center font-semibold">
                    ${user.initial || user.username[0].toUpperCase()}
                </div>
                <div>
                    <p class="font-medium text-gray-800">${user.username}</p>
                    <p class="text-sm text-gray-500">${user.isAdmin ? "Admin" : "User"}</p>
                </div>
            </div>
        `;

            div.onclick = () => window.location.href = `timetable?id=${user.id}`;

            container.appendChild(div);
        });
    }

    async function loadUsers() {
        users = await getAllUsers();

        renderUsers();
    }

    window.addEventListener('click', function(e) {
        const modal = document.getElementById('userModal');
        if (e.target === modal) {
            closeModal();
        }
    });

    loadUsers();

</script>

</body>
</html>
