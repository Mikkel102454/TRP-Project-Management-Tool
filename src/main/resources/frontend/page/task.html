<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tasks</title>
  <link th:href="@{/style/style.css}" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">

<!-- TOP BAR -->

  <div class="max-w-6xl mx-auto px-6 py-3 flex justify-between items-center">

    <a th:href="@{/}">
      <h1 class="tracking-wider text-gray-800 font-semibold">
        TASK CONTROL
      </h1>
    </a>

    <div class="flex items-center gap-4">

      <button onclick="openCreateModal()"
              class="px-3 py-1 border border-gray-600
                     bg-gradient-to-b from-gray-300 to-gray-500
                     hover:from-gray-400 hover:to-gray-600">
        + NEW TASK
      </button>

      <div class="relative">

        <!-- ICON -->
        <div id="headerIcon"
             class="w-9 h-9 bg-gray-700 text-white select-none
              flex items-center justify-center
              border border-black cursor-pointer"
             onclick="toggleUserMenu()">
          ...
        </div>

        <!-- DROPDOWN -->
        <div id="userDropdown"
             class="hidden absolute right-0 top-full mt-2 w-48
              bg-gray-200 border border-gray-600 shadow-lg z-50">

          <button class="w-full text-left px-3 py-2 hover:bg-gray-300"
                  th:onclick="|window.location.href='@{/logout}'|">
            Logout
          </button>

          <button class="w-full text-left px-3 py-2 hover:bg-gray-300"
                  onclick="openPasswordModal(); toggleUserMenu()">
            Change Password
          </button>

          <div th:if="${!#authorization.expression('hasRole(''ADMIN'')')}">
            <button class="w-full text-left px-3 py-2 hover:bg-gray-300"
                    th:onclick="|window.location.href='@{/timetable(id=${#authentication.principal.id})}'|">
              Time Entries
            </button>
          </div>

          <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
            <button class="w-full text-left px-3 py-2 hover:bg-gray-300"
                    th:onclick="|window.location.href='@{/setup}'|">
              User Control
            </button>

            <button class="w-full text-left px-3 py-2 hover:bg-gray-300"
                    th:onclick="|window.location.href='@{/time}'|">
              Time Control
            </button>
          </div>

        </div>

      </div>

    </div>
  </div>
</header>

<!-- CONTENT -->
<main class="max-w-6xl mx-auto px-6 py-4">

  <!-- PROJECT HEADER -->
  <div class="flex justify-between items-center mb-3">

    <h2 id="title"
        class="text-gray-800 tracking-wide">
      LOADING...
    </h2>

    <div class="flex gap-2">
      <button
              class="px-3 py-1 border border-gray-700
             bg-gradient-to-b from-blue-500 to-blue-700
             text-white hover:from-blue-600 hover:to-blue-800"
             onclick="openRenameModal()">
        RENAME
      </button>

      <button
              class="px-3 py-1 border border-gray-700
             bg-gradient-to-b from-red-500 to-red-700
             text-white hover:from-red-600 hover:to-red-800"
              th:attr="onclick=|(async () => {
        const confirmDelete = confirm('Delete project?');
        if (!confirmDelete) return;
        await deleteProject();
        window.location.replace('@{/}');
      })()|">
        DELETE
      </button>
    </div>
  </div>

  <!-- COLUMN LABELS -->
  <div class="grid grid-cols-12 text-xs text-gray-700 mb-2 px-2 pl-0">
    <div class="col-span-5">TASK</div>
    <div class="col-span-3">ASSIGNED</div>
    <div class="col-span-3">ACTIVE</div>
    <div class="col-span-1"></div>
  </div>

  <!-- TASK LIST -->
  <div id="tasks" class="flex flex-col gap-1"></div>

</main>

<!-- MODAL -->
<div id="popupHolder"></div>

<!-- JS -->
<script th:inline="javascript">
  let CONTEXT_PATH = /*[[@{/}]]*/ '/';
  CONTEXT_PATH = CONTEXT_PATH.replace(/\/$/, '');
</script>

<script>
const list = document.getElementById('tasks');

let dragged = null;
let isDragging = false;

let placeholder = document.createElement('div');
placeholder.className = "h-14 border border-gray-500 bg-gray-300 mx-0 my-1 opacity-60";

list.addEventListener('dragstart', (e) => {
  const item = e.target.closest('.task-item');
  if (!item) return;

  dragged = item;
  isDragging = true;

  item.classList.add('opacity-40');

  placeholder.style.height = item.offsetHeight + "px";

  setTimeout(() => {
    item.style.display = "none";
  }, 0);
});

list.addEventListener('dragend', () => {
  if (!dragged) return;

  dragged.style.display = "";
  dragged.classList.remove('opacity-40');

  placeholder.remove();

  setTimeout(() => {
    isDragging = false;
  }, 0);

  dragged = null;
});

list.addEventListener('dragover', (e) => {
  e.preventDefault();

  const afterElement = getDragAfterElement(list, e.clientY);

  if (afterElement == null) {
    list.appendChild(placeholder);
  } else {
    list.insertBefore(placeholder, afterElement);
  }
});

list.addEventListener('drop', async (e) => {
  e.preventDefault();

  if (dragged && placeholder.parentNode) {
    placeholder.parentNode.insertBefore(dragged, placeholder);

    const items = [...list.querySelectorAll('.task-item')];
    const newIndex = items.indexOf(dragged) + 1;

    const taskId = dragged.dataset.id;

    await changeTaskPriority(taskId, newIndex);
    loadProject();
  }
});

document.querySelectorAll('.task-item').forEach(item => {
  item.addEventListener('click', (e) => {
    if (isDragging) {
      e.preventDefault();
      e.stopPropagation();
    }
  });
});

// Smart positioning
function getDragAfterElement(container, y) {
  const elements = [...container.querySelectorAll('.task-item:not(.opacity-40)')];

  return elements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;

    if (offset < 0 && offset > closest.offset) {
      return { offset: offset, element: child };
    } else {
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}
</script>

<script>
  function initUserPicker(modal, allUsers, preselectedUsers = []) {

    const selectedContainer = modal.querySelector('.selectedUsers');
    const dropdown = modal.querySelector('.userDropdown');
    const list = modal.querySelector('.userList');
    const search = modal.querySelector('.userSearch');

    // store selected users by ID
    const selected = new Map();
    preselectedUsers.forEach(u => selected.set(u.id, u));

    function togglePicker() {
      dropdown.classList.toggle('hidden');
      renderList(search.value);
    }

    function renderList(filter) {
      list.innerHTML = "";

      const searchValue = (filter || "").toLowerCase();

      const fragment = document.createDocumentFragment();

      allUsers
              .filter(u =>
                      u.username.toLowerCase().includes(searchValue) &&
                      !selected.has(u.id)
              )
              .forEach(user => {

                const div = document.createElement('div');
                div.className = "px-2 py-1 hover:bg-gray-100 cursor-pointer rounded flex justify-between items-center";

                div.innerHTML = `
        <span>${user.username}</span>
        <span class="text-xs text-gray-400">${user.initial}</span>
      `;

                div.onclick = () => addUser(user);

                fragment.appendChild(div);
              });

      list.appendChild(fragment);
    }

    function addUser(user) {
      selected.set(user.id, user);

      addUserToProject(user.id);

      renderSelected();
      renderList(search.value);
    }

    function renderSelected() {
      const initials = [...selected.values()].map(u => u.initial);

      // use YOUR function
      selectedContainer.innerHTML = renderAvatars(initials);

      // add click-to-remove behavior
      [...selectedContainer.children].forEach((el, index) => {
        const user = [...selected.values()][index];

        el.style.cursor = "pointer";

        el.onclick = () => {
          selected.delete(user.id);

          removeUserToProject(user.id);

          renderSelected();
          renderList(search.value);
        };
      });
    }

    // events
    modal.addEventListener('click', (e) => {
      if (e.target.closest('.userToggle')) {
        togglePicker();
      }
    });

    search.addEventListener('input', () => {
      renderList(search.value);
    });

    // close outside
    window.addEventListener('click', (e) => {
      if (!modal.contains(e.target)) {
        dropdown.classList.add('hidden');
      }
    });

    // initial render
    renderSelected();
  }
</script>

<script>
  const headerIcon = document.getElementById("headerIcon");

  const cachedInitial = localStorage.getItem("userInitial");
