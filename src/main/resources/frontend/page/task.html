<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tasks</title>
  <link href="/style/style.css" rel="stylesheet">

  <style>
    .dragging {
      opacity: 0.4;
    }

    .drag-over {
      margin-top: 12px;
    }
  </style>
</head>

<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->
<header class="bg-white shadow-sm">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
    <a href="/" class="block px-4 py-2 rounded">
      <h1 class="text-xl font-semibold text-gray-800">Tasks</h1>
    </a>

    <div class="w-10 h-10 flex items-center justify-center rounded-full bg-blue-500 text-white font-semibold">
      MK
    </div>
  </div>
</header>

<!-- Content -->
<main class="max-w-6xl mx-auto px-6 py-8">

  <!-- Task Card -->
  <div class="bg-white rounded-xl shadow overflow-hidden">

    <!-- Header -->
    <div class="px-6 py-4 border-b flex justify-between items-center">
      <h2 class="text-lg font-semibold" id="title">Loading ...</h2>

      <button
        class="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-600 transition shadow-sm" onclick="openCreateModal()">
        + New Task
      </button>
    </div>

    <!-- TASK LIST -->
    <div id="tasks">

    </div>

  </div>

</main>

<!-- MODAL -->
<div id="popupHolder">

</div>

<!-- JS -->
<script>
window.addEventListener('click', function(e) {
  const modal = document.getElementById('taskModal');
  if (e.target === modal) {
    document.getElementById("taskModal").remove()
  }
});

</script>

<script>
const list = document.getElementById('tasks');

let dragged = null;
let isDragging = false;

let placeholder = document.createElement('div');
placeholder.className = "h-14 border-2 border-blue-400 rounded-lg mx-6 my-1 bg-blue-50 opacity-70";

list.addEventListener('dragstart', (e) => {
  const item = e.target.closest('.task-item');
  if (!item) return;

  dragged = item;
  isDragging = true;

  item.classList.add('opacity-40');

  placeholder.style.height = item.offsetHeight + "px";

  setTimeout(() => {
    item.style.display = "none";
  }, 0);
});

list.addEventListener('dragend', () => {
  if (!dragged) return;

  dragged.style.display = "flex";
  dragged.classList.remove('opacity-40');

  placeholder.remove();

  setTimeout(() => {
    isDragging = false;
  }, 0);

  dragged = null;
});

list.addEventListener('dragover', (e) => {
  e.preventDefault();

  const afterElement = getDragAfterElement(list, e.clientY);

  if (afterElement == null) {
    list.appendChild(placeholder);
  } else {
    list.insertBefore(placeholder, afterElement);
  }
});

list.addEventListener('drop', (e) => {
  e.preventDefault();

  if (dragged && placeholder.parentNode) {
    placeholder.parentNode.insertBefore(dragged, placeholder);
  }
});

// 🔥 Prevent click during drag
document.querySelectorAll('.task-item').forEach(item => {
  item.addEventListener('click', (e) => {
    if (isDragging) {
      e.preventDefault();
      e.stopPropagation();
    }
  });
});

// Smart positioning
function getDragAfterElement(container, y) {
  const elements = [...container.querySelectorAll('.task-item:not(.opacity-40)')];

  return elements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;

    if (offset < 0 && offset > closest.offset) {
      return { offset: offset, element: child };
    } else {
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}
</script>

<script src="/code/network/TaskNet.js"></script>
<script src="/code/pages/task.js"></script>
</body>
</html>
