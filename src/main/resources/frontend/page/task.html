<html lang="en">

      opacity: 0.4;

<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->
<header class="bg-white shadow-sm">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
    <a href="/" class="block rounded">
      <h1 class="text-xl font-semibold text-gray-800">Tasks</h1>
    </a>

    <div class="relative inline-block">

      <!-- User icon -->
      <div id="headerIcon"
           class="w-10 h-10 bg-blue-200 font-bold rounded-full flex items-center justify-center cursor-pointer"
           onclick="toggleUserMenu()">...
      </div>

      <!-- Dropdown -->
      <div id="userDropdown"
           class="hidden absolute right-0 mt-2 w-48 bg-white border rounded-lg shadow-lg z-50">

        <!-- Logout -->
        <button class="w-full text-left px-4 py-2 hover:bg-gray-100"
                onclick="window.location.href = '/login';">
        Logout
        </button>

        <!-- Admin only -->
        <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">

          <button class="w-full text-left px-4 py-2 hover:bg-gray-100"
                  onclick="window.location.href='/setup'">
            Setup Account
          </button>

        </div>

      </div>
    </div>
  </div>
</header>

<!-- Content -->
<main class="max-w-6xl mx-auto px-6 py-8">

  <!-- Task Card -->
  <div class="bg-white rounded-xl shadow overflow-hidden">

    <!-- Header -->
    <div class="px-6 py-4 border-b flex justify-between items-center">
      <h2 class="text-lg font-semibold" id="title">Loading ...</h2>

      <div class="flex gap-2">
        <button
                class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-red-600 transition shadow-sm"
                onclick="(async () => {
                  const confirmDelete = confirm('Are you sure you want to delete this project?');
                  if (!confirmDelete) return;
                  await deleteProject();
                  window.location.replace('/');
                })()">
          Delete
        </button>

        <button
          class="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-600 transition shadow-sm" onclick="openCreateModal()">
          + New Task
        </button>
      </div>
    </div>

    <!-- TASK LIST -->
    <div id="tasks">

    </div>

  </div>

</main>

<!-- MODAL -->
<div id="popupHolder">

</div>

<!-- JS -->
<script>
window.addEventListener('click', function(e) {
  const modal = document.getElementById('taskModal');
  if (e.target === modal) {
    document.getElementById("taskModal").remove()
  }
});

</script>

<script>
const list = document.getElementById('tasks');

let dragged = null;
let isDragging = false;

let placeholder = document.createElement('div');
placeholder.className = "h-14 border-2 border-blue-400 rounded-lg mx-6 my-1 bg-blue-50 opacity-70";

list.addEventListener('dragstart', (e) => {
  const item = e.target.closest('.task-item');
  if (!item) return;

  dragged = item;
  isDragging = true;

  item.classList.add('opacity-40');

  placeholder.style.height = item.offsetHeight + "px";

  setTimeout(() => {
    item.style.display = "none";
  }, 0);
});

list.addEventListener('dragend', () => {
  if (!dragged) return;

  dragged.style.display = "flex";
  dragged.classList.remove('opacity-40');

  placeholder.remove();

  setTimeout(() => {
    isDragging = false;
  }, 0);

  dragged = null;
});

list.addEventListener('dragover', (e) => {
  e.preventDefault();

  const afterElement = getDragAfterElement(list, e.clientY);

  if (afterElement == null) {
    list.appendChild(placeholder);
  } else {
    list.insertBefore(placeholder, afterElement);
  }
});

list.addEventListener('drop', async (e) => {
  e.preventDefault();

  if (dragged && placeholder.parentNode) {
    placeholder.parentNode.insertBefore(dragged, placeholder);

    const items = [...list.querySelectorAll('.task-item')];
    const newIndex = items.indexOf(dragged) + 1;

    const taskId = dragged.dataset.id;

    await changeTaskPriority(taskId, newIndex);
    loadProject();
  }
});

document.querySelectorAll('.task-item').forEach(item => {
  item.addEventListener('click', (e) => {
    if (isDragging) {
      e.preventDefault();
      e.stopPropagation();
    }
  });
});

// Smart positioning
function getDragAfterElement(container, y) {
  const elements = [...container.querySelectorAll('.task-item:not(.opacity-40)')];

  return elements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;

    if (offset < 0 && offset > closest.offset) {
      return { offset: offset, element: child };
    } else {
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}
</script>

<script>
  function initUserPicker(modal, allUsers, preselectedUsers = []) {

    const selectedContainer = modal.querySelector('.selectedUsers');
    const dropdown = modal.querySelector('.userDropdown');
    const list = modal.querySelector('.userList');
    const search = modal.querySelector('.userSearch');

    // store selected users by ID
    const selected = new Map();
    preselectedUsers.forEach(u => selected.set(u.id, u));

    function togglePicker() {
      dropdown.classList.toggle('hidden');
      renderList(search.value);
    }

    function renderList(filter) {
      list.innerHTML = "";

      const searchValue = (filter || "").toLowerCase();

      const fragment = document.createDocumentFragment();

      allUsers
              .filter(u =>
                      u.username.toLowerCase().includes(searchValue) &&
                      !selected.has(u.id)
              )
              .forEach(user => {

                const div = document.createElement('div');
                div.className = "px-2 py-1 hover:bg-gray-100 cursor-pointer rounded flex justify-between items-center";

                div.innerHTML = `
        <span>${user.username}</span>
        <span class="text-xs text-gray-400">${user.initial}</span>
      `;

                div.onclick = () => addUser(user);

                fragment.appendChild(div);
              });

      list.appendChild(fragment);
    }

    function addUser(user) {
      selected.set(user.id, user);

      addUserToProject(user.id);

      renderSelected();
      renderList(search.value);
    }

    function renderSelected() {
      const initials = [...selected.values()].map(u => u.initial);

      // use YOUR function
      selectedContainer.innerHTML = renderAvatars(initials);

      // add click-to-remove behavior
      [...selectedContainer.children].forEach((el, index) => {
        const user = [...selected.values()][index];

        el.style.cursor = "pointer";

        el.onclick = () => {
          selected.delete(user.id);

          removeUserToProject(user.id);

          renderSelected();
          renderList(search.value);
        };
      });
    }

    // events
    modal.addEventListener('click', (e) => {
      if (e.target.closest('.userToggle')) {
        togglePicker();
      }
    });

    search.addEventListener('input', () => {
      renderList(search.value);
    });

    // close outside
    window.addEventListener('click', (e) => {
      if (!modal.contains(e.target)) {
        dropdown.classList.add('hidden');
      }
    });

    // initial render
    renderSelected();
  }
</script>
