<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link href="/style/style.css" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen">

<!-- NAVBAR -->
<header class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="/" class="block rounded">
            <h1 class="text-xl font-semibold text-gray-800">Projects</h1>
        </a>

        <div class="relative inline-block">

            <!-- User icon -->
            <div id="headerIcon"
                 class="w-10 h-10 bg-blue-200 font-bold rounded-full flex items-center justify-center cursor-pointer"
                 onclick="toggleUserMenu()">...
            </div>

            <!-- Dropdown -->
            <div id="userDropdown"
                 class="hidden absolute right-0 mt-2 w-48 bg-white border rounded-lg shadow-lg z-50">

                <!-- Logout -->
                <button class="w-full text-left px-4 py-2 hover:bg-gray-100"
                        onclick="window.location.href = '/login';">
                    Logout
                </button>

                <!-- Admin only -->
                <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">

                    <button class="w-full text-left px-4 py-2 hover:bg-gray-100"
                            onclick="window.location.href='/setup'">
                        Setup Account
                    </button>

                </div>

            </div>
        </div>
    </div>
</header>

<!-- CONTENT -->
<main class="max-w-6xl mx-auto px-6 py-6">

    <div class="flex justify-between items-center">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Projects</h2>

        <button
                class="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-600 transition shadow-sm" onclick="openCreateModal()">
            + New Task
        </button>
    </div>

    <!-- Placeholder -->
    <div id="projects" class="flex flex-col gap-3">

        <div class="bg-white p-4 rounded-xl shadow text-gray-500 text-sm">
            Loading projects...
        </div>

    </div>

    <!-- MODAL -->
    <div id="popupHolder">

    </div>
</main>

<!-- JS -->
<script>
    window.addEventListener('click', function(e) {
        const modal = document.getElementById('projectModal');
        if (e.target === modal) {
            document.getElementById("projectModal").remove()
        }
    });

</script>

<script>
    const headerIcon = document.getElementById("headerIcon");

    const cachedInitial = localStorage.getItem("userInitial");
    if (cachedInitial) {
        headerIcon.innerText = cachedInitial;
    }
</script>
<script src="/code/util/logger.js"></script>
<script src="/code/util/components.js"></script>
<script src="/code/util/avatar.js"></script>
<script src="/code/util/user.js"></script>
<script src="/code/consts.js"></script>

<script src="/code/dto/User.js"></script>
<script src="/code/dto/Task.js"></script>
<script src="/code/dto/Project.js"></script>
<script src="/code/util/header.js"></script>

<script src="/code/network/ProjectNet.js"></script>
<script src="/code/network/TaskNet.js"></script>
<script src="/code/pages/index.js"></script>

</body>
</html>
