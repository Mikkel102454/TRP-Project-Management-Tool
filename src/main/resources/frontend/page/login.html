<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="/style/style.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm">

    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
        Login
    </h2>

    <form th:action="@{/login}" method="post">

        <!-- Error message -->
        <div
                th:if="${param.error}"
                class="border border-red-500 bg-red-100 text-red-700 p-3 rounded mb-4"
        >
            Invalid email or password
        </div>

        <!-- Email -->
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Email</label>
            <input
                    type="text"
                    name="username"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400"
            >
        </div>

        <!-- Password -->
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Password</label>
            <input
                    type="password"
                    name="password"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400"
            >
        </div>

        <!-- Remember Me -->
        <div class="flex items-center justify-between mb-6">
            <label class="flex items-center space-x-2 text-gray-700">
                <input
                        type="checkbox"
                        name="remember-me"
                        class="w-4 h-4 text-blue-500 border-gray-300 rounded focus:ring-2 focus:ring-blue-400 focus:outline-none"
                >
                <span>Remember me</span>
            </label>
        </div>

        <!-- Button -->
        <button
                type="submit"
                class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition"
        >
            Sign In
        </button>

    </form>
</div>

</body>
</html>
