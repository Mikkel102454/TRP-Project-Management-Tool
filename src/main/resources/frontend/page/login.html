<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link th:href="@{/style/style.css}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>

<body class="bg-gradient-to-b from-gray-300 to-gray-200 min-h-screen flex items-center justify-center font-mono text-sm">

<div class="w-full max-w-md
            border border-gray-600
            bg-gradient-to-b from-gray-200 to-gray-300
            shadow-[0_10px_30px_rgba(0,0,0,0.5)]">

    <!-- HEADER -->
    <div class="px-4 py-2 border-b border-gray-500
                bg-gradient-to-b from-gray-300 to-gray-400
                tracking-wider text-gray-800 text-center">
        LOGIN
    </div>

    <!-- CONTENT -->
    <form th:action="@{/login}" method="post" class="p-4 space-y-4 text-gray-800">

        <div th:if="${param.error}"
             class="border border-red-700 bg-red-200 text-red-900 px-2 py-1 text-xs">
            INVALID CREDENTIALS
        </div>

        <!-- USERNAME -->
        <div class="grid grid-cols-3 items-center gap-3">
            <span class="text-xs text-gray-700">USERNAME</span>
            <input type="text" name="username"
                   class="col-span-2 px-2 py-1 border border-gray-500 bg-gray-100 focus:bg-white outline-none">
        </div>

        <!-- PASSWORD -->
        <div class="grid grid-cols-3 items-center gap-3">
            <span class="text-xs text-gray-700">PASSWORD</span>
            <input type="password" name="password"
                   class="col-span-2 px-2 py-1 border border-gray-500 bg-gray-100 focus:bg-white outline-none">
        </div>

        <!-- REMEMBER -->
        <div class="grid grid-cols-3 items-center gap-3">
            <span class="text-xs text-gray-700">REMEMBER</span>
            <div class="col-span-2 flex items-center">
                <input type="checkbox" name="remember-me">
            </div>
        </div>

        <!-- FOOTER -->
        <div class="flex justify-between items-center pt-2">

            <span class="text-xs text-gray-600">

            </span>

            <button type="submit"
                    class="px-3 py-1 border border-gray-700
                           bg-gradient-to-b from-gray-500 to-gray-700
                           text-white hover:from-gray-600 hover:to-gray-800">
                LOGIN
            </button>
        </div>

    </form>
</div>

</body>
</html>
